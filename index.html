<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritesh Muralidhar — Portfolio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  /* LOADING SCREEN */
  #loading {
    position: fixed; inset: 0; z-index: 1000;
    background: #0a0a0f;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.8s ease;
  }
  #loading.hide { opacity: 0; pointer-events: none; }
  .load-title {
    font-family: 'Courier New', monospace;
    font-size: 13px; letter-spacing: 0.3em;
    color: #c8f135; text-transform: uppercase;
    margin-bottom: 48px;
  }
  .car-anim {
    font-size: 40px;
    animation: drive 1s ease-in-out infinite alternate;
    margin-bottom: 32px;
  }
  @keyframes drive { from{transform:translateX(-20px) rotate(-3deg)} to{transform:translateX(20px) rotate(3deg)} }
  .progress-bar {
    width: 200px; height: 2px;
    background: rgba(200,241,53,0.15);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: #c8f135;
    width: 0%; transition: width 0.3s ease;
    border-radius: 2px;
  }
  .load-hint { margin-top: 24px; font-size: 11px; color: rgba(200,241,53,0.4); letter-spacing: 0.15em; }

  /* HUD */
  #hud {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
  }

  /* CONTROLS HINT */
  #controls-hint {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 12px; align-items: center;
    background: rgba(10,10,15,0.8);
    border: 1px solid rgba(200,241,53,0.2);
    border-radius: 100px;
    padding: 10px 24px;
    font-size: 12px; color: rgba(200,241,53,0.7);
    letter-spacing: 0.1em;
    backdrop-filter: blur(12px);
    transition: opacity 0.5s;
    pointer-events: none;
  }
  .key {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    background: rgba(200,241,53,0.12);
    border: 1px solid rgba(200,241,53,0.3);
    border-radius: 4px;
    font-size: 11px; color: #c8f135;
    font-weight: bold;
  }

  /* SPEED METER */
  #speedometer {
    position: fixed; bottom: 32px; right: 32px;
    width: 80px; height: 80px;
    pointer-events: none;
  }
  .speed-ring { transition: stroke-dashoffset 0.1s; }
  #speed-num {
    position: fixed; bottom: 54px; right: 56px;
    font-size: 16px; font-weight: bold;
    color: #c8f135; text-align: center;
    pointer-events: none;
  }
  #speed-label {
    position: fixed; bottom: 40px; right: 50px;
    font-size: 9px; color: rgba(200,241,53,0.5);
    letter-spacing: 0.1em; pointer-events: none;
  }

  /* ZONE LABEL */
  #zone-label {
    position: fixed; top: 32px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(10,10,15,0.9);
    border: 1px solid rgba(200,241,53,0.4);
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 13px; color: #c8f135;
    letter-spacing: 0.2em; text-transform: uppercase;
    backdrop-filter: blur(16px);
    opacity: 0;
    transition: all 0.4s ease;
    pointer-events: none;
  }
  #zone-label.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MINI MAP */
  #minimap-wrap {
    position: fixed; top: 24px; right: 24px;
    pointer-events: none;
  }
  #minimap {
    width: 100px; height: 100px;
    background: rgba(10,10,15,0.8);
    border: 1px solid rgba(200,241,53,0.2);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
  }
  #minimap-car {
    width: 6px; height: 10px;
    background: #c8f135;
    border-radius: 2px;
    position: absolute;
    transform-origin: center;
    transition: left 0.05s, top 0.05s;
    box-shadow: 0 0 6px #c8f135;
  }
  .minimap-zone {
    position: absolute;
    border-radius: 3px;
    opacity: 0.35;
  }
  #minimap-label {
    text-align: center; font-size: 9px;
    color: rgba(200,241,53,0.4);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-top: 6px;
  }

  /* INFO PANEL */
  #info-panel {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 380px;
    background: rgba(8,8,14,0.96);
    border-right: 1px solid rgba(200,241,53,0.15);
    backdrop-filter: blur(24px);
    transform: translateX(-100%);
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 50;
    overflow-y: auto;
    pointer-events: all;
  }
  #info-panel.open { transform: translateX(0); }
  .panel-header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid rgba(200,241,53,0.1);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .panel-zone-tag {
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: #c8f135; margin-bottom: 8px;
  }
  .panel-title {
    font-family: 'Georgia', serif;
    font-size: 28px; font-weight: normal;
    color: #f0f0ff; line-height: 1.1;
  }
  .panel-close {
    width: 32px; height: 32px;
    background: rgba(200,241,53,0.08);
    border: 1px solid rgba(200,241,53,0.2);
    border-radius: 50%;
    color: #c8f135; font-size: 16px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0; margin-left: 16px;
    pointer-events: all;
  }
  .panel-close:hover { background: rgba(200,241,53,0.2); }
  .panel-body { padding: 24px 32px 32px; }

  /* ABOUT */
  .about-avatar {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #c8f135, #00f5d4);
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    font-size: 32px; margin-bottom: 20px;
  }
  .about-name {
    font-family: 'Georgia', serif;
    font-size: 22px; color: #f0f0ff; margin-bottom: 4px;
  }
  .about-role { font-size: 12px; color: #c8f135; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }
  .about-bio { font-size: 14px; color: #9999aa; line-height: 1.8; margin-bottom: 24px; }
  .info-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; color: #9999aa; }
  .info-row span:first-child { color: #c8f135; font-size: 16px; }

  /* EXPERIENCE */
  .exp-item { margin-bottom: 28px; padding-bottom: 28px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .exp-item:last-child { border-bottom: none; margin-bottom: 0; }
  .exp-period { font-size: 11px; color: #c8f135; letter-spacing: 0.1em; margin-bottom: 6px; }
  .exp-role { font-size: 16px; color: #f0f0ff; font-family: 'Georgia', serif; margin-bottom: 4px; }
  .exp-company { font-size: 13px; color: #9999aa; margin-bottom: 10px; }
  .exp-desc { font-size: 13px; color: #777788; line-height: 1.7; }

  /* PROJECTS */
  .proj-card {
    background: rgba(200,241,53,0.04);
    border: 1px solid rgba(200,241,53,0.1);
    border-radius: 10px; padding: 18px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .proj-card:hover { border-color: rgba(200,241,53,0.3); }
  .proj-emoji { font-size: 24px; margin-bottom: 10px; display: block; }
  .proj-name { font-size: 16px; color: #f0f0ff; font-family: 'Georgia', serif; margin-bottom: 6px; }
  .proj-desc { font-size: 13px; color: #9999aa; line-height: 1.6; margin-bottom: 12px; }
  .proj-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .proj-tag {
    font-size: 10px; padding: 3px 8px;
    background: rgba(200,241,53,0.08);
    border: 1px solid rgba(200,241,53,0.2);
    border-radius: 100px; color: #c8f135;
    letter-spacing: 0.05em;
  }

  /* SKILLS */
  .skill-row { margin-bottom: 16px; }
  .skill-top { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
  .skill-name-txt { color: #f0f0ff; }
  .skill-pct { color: #c8f135; font-size: 12px; }
  .skill-bar { height: 3px; background: rgba(200,241,53,0.1); border-radius: 3px; overflow: hidden; }
  .skill-fill { height: 100%; background: linear-gradient(90deg, #c8f135, #00f5d4); border-radius: 3px; width: 0%; transition: width 1s ease; }

  /* CONTACT */
  .contact-link {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px;
    background: rgba(200,241,53,0.04);
    border: 1px solid rgba(200,241,53,0.1);
    border-radius: 10px; margin-bottom: 12px;
    text-decoration: none; cursor: pointer;
    transition: all 0.2s;
  }
  .contact-link:hover { background: rgba(200,241,53,0.1); border-color: rgba(200,241,53,0.4); transform: translateX(4px); }
  .contact-icon { font-size: 22px; }
  .contact-label { font-size: 13px; color: #9999aa; margin-bottom: 2px; }
  .contact-value { font-size: 14px; color: #f0f0ff; }

  /* ENTER PROMPT */
  #enter-prompt {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) scale(0.9);
    background: rgba(10,10,15,0.92);
    border: 1px solid rgba(200,241,53,0.5);
    border-radius: 12px; padding: 14px 28px;
    display: flex; align-items: center; gap: 12px;
    opacity: 0; pointer-events: none;
    transition: all 0.3s ease;
    backdrop-filter: blur(16px);
  }
  #enter-prompt.show { opacity: 1; transform: translateX(-50%) scale(1); pointer-events: all; }
  .enter-key {
    background: rgba(200,241,53,0.15);
    border: 1px solid rgba(200,241,53,0.4);
    border-radius: 6px; padding: 4px 10px;
    font-size: 12px; color: #c8f135; letter-spacing: 0.1em;
  }
  #enter-prompt span { font-size: 13px; color: rgba(200,241,53,0.8); }

  /* EXHAUST */
  .particle {
    position: fixed; pointer-events: none;
    border-radius: 50%; z-index: 5;
  }
  /* GARAGE PANEL */
  #garage-panel {
    position: fixed; inset: 0;
    background: rgba(6,6,12,0.97);
    backdrop-filter: blur(24px);
    z-index: 60;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #garage-panel.open { opacity: 1; pointer-events: all; }
  .garage-title { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: #c8f135; margin-bottom: 12px; }
  .garage-h1 { font-family: 'Georgia', serif; font-size: 42px; font-weight: normal; color: #f0f0ff; margin-bottom: 8px; }
  .garage-sub { font-size: 13px; color: #9999aa; margin-bottom: 48px; letter-spacing: 0.05em; }
  .car-grid { display: grid; grid-template-columns: repeat(3, 190px); gap: 20px; margin-bottom: 40px; }
  .car-option {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 24px 16px 20px; cursor: pointer; text-align: center;
    transition: all 0.25s; position: relative;
  }
  .car-option:hover { border-color: rgba(200,241,53,0.5); background: rgba(200,241,53,0.06); transform: translateY(-4px); }
  .car-option.selected { border-color: #c8f135; background: rgba(200,241,53,0.1); }
  .car-option.selected::after { content:'✓'; position:absolute; top:10px; right:14px; color:#c8f135; font-size:14px; }
  .car-emoji { font-size: 52px; display: block; margin-bottom: 14px; }
  .car-name { font-size: 15px; color: #f0f0ff; font-family:'Georgia',serif; margin-bottom: 4px; }
  .car-desc { font-size: 12px; color: #9999aa; line-height: 1.5; margin-bottom: 10px; }
  .car-tags { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; }
  .car-tag { font-size:10px; padding:2px 8px; border-radius:100px; background:rgba(200,241,53,0.08); border:1px solid rgba(200,241,53,0.2); color:#c8f135; letter-spacing:0.05em; }
  .garage-close { background:transparent; border:1px solid rgba(255,255,255,0.15); color:#9999aa; font-size:13px; padding:10px 32px; border-radius:100px; cursor:pointer; letter-spacing:0.1em; font-family:'Courier New',monospace; transition:all 0.2s; }
  .garage-close:hover { border-color:#c8f135; color:#c8f135; }

  /* ── RESPONSIVE / MOBILE ── */

  /* Touch joystick */
  #joystick-wrap {
    display: none;
    position: fixed; bottom: 28px; left: 28px;
    z-index: 30; pointer-events: all;
  }
  #joystick-base {
    width: 110px; height: 110px;
    background: rgba(10,10,15,0.6);
    border: 1.5px solid rgba(200,241,53,0.25);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
    touch-action: none;
  }
  #joystick-knob {
    width: 44px; height: 44px;
    background: rgba(200,241,53,0.85);
    border-radius: 50%;
    position: absolute;
    transform: translate(-50%, -50%);
    left: 50%; top: 50%;
    pointer-events: none;
    box-shadow: 0 0 16px rgba(200,241,53,0.5);
    transition: left 0.05s, top 0.05s;
  }

  /* Mobile E button */
  #mobile-e-btn {
    display: none;
    position: fixed; bottom: 28px; right: 28px;
    width: 64px; height: 64px;
    background: rgba(10,10,15,0.8);
    border: 1.5px solid rgba(200,241,53,0.4);
    border-radius: 50%;
    color: #c8f135; font-size: 13px; font-weight: bold;
    letter-spacing: 0.05em;
    align-items: center; justify-content: center;
    z-index: 30; cursor: pointer;
    backdrop-filter: blur(10px);
    touch-action: none;
    font-family: 'Courier New', monospace;
  }

  @media (max-width: 768px) {
    /* Show touch controls */
    #joystick-wrap  { display: block; }
    #mobile-e-btn   { display: flex; }
    /* Hide keyboard hint */
    #controls-hint  { display: none; }
    /* Konami hint hidden */
    .konami-hint    { display: none; }

    /* Info panel full-width on mobile */
    #info-panel {
      width: 100%;
      top: auto; bottom: 0;
      height: 70vh;
      border-right: none;
      border-top: 1px solid rgba(200,241,53,0.2);
      border-radius: 16px 16px 0 0;
      transform: translateY(100%);
    }
    #info-panel.open { transform: translateY(0); }

    /* Garage panel */
    .garage-h1   { font-size: 28px; }
    .garage-sub  { margin-bottom: 24px; font-size: 12px; }
    .car-grid    { grid-template-columns: repeat(2, 1fr); gap: 12px; width: 90vw; }
    .car-emoji   { font-size: 36px; }
    .car-name    { font-size: 13px; }
    .car-desc    { font-size: 11px; }

    /* Shrink minimap */
    #minimap     { width: 72px; height: 72px; }
    #minimap-wrap { top: 16px; right: 16px; }

    /* Shrink speedometer */
    #speedometer  { width: 56px; height: 56px; bottom: 110px; right: 16px; }
    #speed-num    { font-size: 12px; bottom: 126px; right: 30px; }
    #speed-label  { bottom: 114px; right: 24px; }

    /* Zone label smaller */
    #zone-label   { font-size: 11px; padding: 8px 16px; }

    /* Enter prompt above joystick */
    #enter-prompt { bottom: 155px; }

    /* Reset blocks button */
    #reset-btn-blocks { top: 16px; left: 16px; font-size: 11px; padding: 6px 14px; }
  }

  @media (max-width: 480px) {
    .car-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .garage-h1 { font-size: 22px; }
    .panel-title { font-size: 22px; }
    .panel-header { padding: 20px 20px 14px; }
    .panel-body { padding: 16px 20px 24px; }
    .about-name { font-size: 18px; }
  }
</style>
</head>
<body>

<!-- TOUCH JOYSTICK (mobile only) -->
<div id="joystick-wrap">
  <div id="joystick-base">
    <div id="joystick-knob"></div>
  </div>
</div>

<!-- MOBILE E BUTTON -->
<button id="mobile-e-btn" ontouchstart="mobileE()">E</button>

<!-- GARAGE PANEL -->
<div id="garage-panel">
  <div class="garage-title">🔧 Garage</div>
  <div class="garage-h1">Choose Your Ride</div>
  <div class="garage-sub">Select a car and hit the road</div>
  <div class="car-grid" id="car-grid"></div>
  <button class="garage-close" onclick="closeGarage()">✕ Back to driving</button>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="load-title">Initializing world...</div>
  <div class="car-anim">🚗</div>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="load-hint">Drive around to explore</div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="zone-label"></div>

  <!-- Minimap -->
  <div id="minimap-wrap">
    <div id="minimap">
      <div id="minimap-car"></div>
    </div>
    <div id="minimap-label">· MAP ·</div>
  </div>

  <!-- Speed -->
  <svg id="speedometer" viewBox="0 0 80 80">
    <circle cx="40" cy="40" r="32" fill="none" stroke="rgba(200,241,53,0.08)" stroke-width="4"/>
    <circle class="speed-ring" cx="40" cy="40" r="32" fill="none" stroke="#c8f135" stroke-width="4"
      stroke-dasharray="201" stroke-dashoffset="201" stroke-linecap="round"
      transform="rotate(-90 40 40)" id="speed-arc"/>
  </svg>
  <div id="speed-num">0</div>
  <div id="speed-label">KM/H</div>
</div>

<!-- Controls hint -->
<div id="controls-hint">
  <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span>
  <span style="color:rgba(200,241,53,0.4);margin:0 4px">or</span>
  <span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span>
  <span style="color:rgba(200,241,53,0.4);margin:0 8px">·</span>
  <span style="color:rgba(200,241,53,0.5)">Drive to zones · Press</span>
  <span class="key" style="width:auto;padding:0 8px">E</span>
  <span style="color:rgba(200,241,53,0.5)">to enter</span>
</div>

<!-- Enter prompt -->
<div id="enter-prompt">
  <span class="enter-key">E</span>
  <span id="enter-text">Enter zone</span>
</div>

<!-- Info Panel -->
<div id="info-panel">
  <div class="panel-header">
    <div>
      <div class="panel-zone-tag" id="panel-tag"></div>
      <div class="panel-title" id="panel-title"></div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

function makeRoad(x, z, w, h, vertical = false) {
  const geo = new THREE.BoxGeometry(vertical ? w : h, 0.05, vertical ? h : w);
  const mat = new THREE.MeshLambertMaterial({ color: 0x111118 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, 0.02, z);
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Road markings
  const markCount = Math.floor((vertical ? h : h) / 4);
  for (let i = 0; i < markCount; i++) {
    const mGeo = new THREE.BoxGeometry(vertical ? 0.15 : 1.2, 0.06, vertical ? 1.2 : 0.15);
    const mMat = new THREE.MeshBasicMaterial({ color: 0x333344 });
    const mark = new THREE.Mesh(mGeo, mMat);
    const offset = -((markCount - 1) / 2) * 4 + i * 4;
    mark.position.set(x + (vertical ? 0 : offset), 0.03, z + (vertical ? offset : 0));
    scene.add(mark);
  }
}

function buildZoneSign(zone) {
  const col = zone.glow;
  const hexStr = '#' + col.toString(16).padStart(6, '0');

  // ── CANVAS TEXTURE ──
  const W = 512, H = 256;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx2 = cv.getContext('2d');

  // Dark background
  ctx2.fillStyle = '#0a0a14';
  ctx2.roundRect(0, 0, W, H, 24);
  ctx2.fill();

  // Glowing border
  ctx2.strokeStyle = hexStr;
  ctx2.lineWidth = 8;
  ctx2.roundRect(6, 6, W - 12, H - 12, 20);
  ctx2.stroke();

  // Inner subtle glow fill
  const grad = ctx2.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, hexStr + '18');
  grad.addColorStop(1, hexStr + '04');
  ctx2.fillStyle = grad;
  ctx2.roundRect(8, 8, W - 16, H - 16, 18);
  ctx2.fill();

  // Emoji
  ctx2.font = '80px serif';
  ctx2.textAlign = 'center';
  ctx2.textBaseline = 'middle';
  ctx2.fillText(zone.emoji, W / 2, 80);

  // Zone name
  ctx2.fillStyle = '#ffffff';
  ctx2.font = `bold 72px "Arial Black", Impact, sans-serif`;
  ctx2.textAlign = 'center';
  ctx2.textBaseline = 'middle';
  ctx2.fillText(zone.word, W / 2, 178);

  // Glow on text
  ctx2.shadowColor = hexStr;
  ctx2.shadowBlur = 18;
  ctx2.fillStyle = hexStr;
  ctx2.font = `bold 72px "Arial Black", Impact, sans-serif`;
  ctx2.fillText(zone.word, W / 2, 178);
  ctx2.shadowBlur = 0;

  const tex = new THREE.CanvasTexture(cv);

  // ── BOARD MESH — stands upright inside the ring ──
  const boardW = 5.5, boardH = 2.8, boardD = 0.18;
  const boardMat  = new THREE.MeshBasicMaterial({ map: tex });
  const backMat   = new THREE.MeshBasicMaterial({ map: tex }); // same texture on back
  const edgeMat   = new THREE.MeshBasicMaterial({ color: col });

  // Board — edge sides use zone colour, front AND back use the texture
  const board = new THREE.Mesh(new THREE.BoxGeometry(boardW, boardH, boardD), [
    edgeMat, edgeMat, edgeMat, edgeMat, boardMat, backMat
  ]);
  board.position.set(zone.x, boardH / 2 + 0.6, zone.z);
  board.castShadow = true;
  scene.add(board);

  // Two support legs
  const legMat = new THREE.MeshLambertMaterial({ color: 0x222233 });
  [-1.8, 1.8].forEach(ox => {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.7, 0.12), legMat);
    leg.position.set(zone.x + ox, 0.35, zone.z);
    scene.add(leg);
  });

  // Glow light behind board
  const pt = new THREE.PointLight(col, 4, 18);
  pt.position.set(zone.x, boardH / 2 + 1.2, zone.z + 0.5);
  scene.add(pt);

  // Ground glow ring
  const ringGeo = new THREE.TorusGeometry(5.5, 0.18, 8, 48);
  const ringMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.4 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.set(zone.x, 0.05, zone.z);
  scene.add(ring);

  // Ground disc fill (subtle)
  const discGeo = new THREE.CylinderGeometry(5.3, 5.3, 0.04, 48);
  const discMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.06 });
  const disc = new THREE.Mesh(discGeo, discMat);
  disc.position.set(zone.x, 0.02, zone.z);
  scene.add(disc);

  zone._board   = board;
  zone._ring    = ring;
  zone._ringMat = ringMat;
  zone._pt      = pt;
}

// ── ANIMATE ──
let t = 0;

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05);
  t += delta;

  if (!panelOpen && !garageOpen) {
    // ── CAR INPUT ──
    const fwd = keys['ArrowUp']   || keys['KeyW'];
    const bwd = keys['ArrowDown'] || keys['KeyS'];
    const lft = keys['ArrowLeft'] || keys['KeyA'];
    const rgt = keys['ArrowRight']|| keys['KeyD'];

    const accel = 70;
    const steer = 3.2;
    const friction = 0.92;
    const maxSpeed = 45;

    if (fwd) carState.speed = Math.min(carState.speed + accel * delta, maxSpeed);
    if (bwd) carState.speed = Math.max(carState.speed - accel * delta * 0.8, -maxSpeed * 0.4);
    carState.speed *= friction;

    if (Math.abs(carState.speed) > 0.5) {
      const steerAmt = steer * delta * (carState.speed > 0 ? 1 : -1);
      if (lft) carState.angle += steerAmt;
      if (rgt) carState.angle -= steerAmt;
    }

    // Touch joystick
    applyJoystick(delta);

    // Move — carGroup faces +Z, angle=0 means pointing +Z
    // sin(angle) = X component, cos(angle) = Z component
    carState.x += Math.sin(carState.angle) * carState.speed * delta;
    carState.z += Math.cos(carState.angle) * carState.speed * delta;

    // Bounds
    const bound = 46;
    if (Math.abs(carState.x) > bound) { carState.x = Math.sign(carState.x) * bound; carState.speed *= -0.3; }
    if (Math.abs(carState.z) > bound) { carState.z = Math.sign(carState.z) * bound; carState.speed *= -0.3; }

    // Wheel spin — forward direction is +Z on the wheel group (rotated on X axis)
    carState.wheelRot += carState.speed * delta * 1.8;
    wheels.forEach(w => { w.rotation.x = carState.wheelRot; });
  }

  // Update car mesh — rotation.y = angle so car faces direction of travel
  carGroup.position.set(carState.x, 0, carState.z);
  carGroup.rotation.y = carState.angle;

  // Camera — sit behind the car (-Z in car space = behind)
  const camDist = 14;
  const camH    = 10;
  // Behind = opposite of facing direction
  const behindX = carState.x - Math.sin(carState.angle) * camDist;
  const behindZ = carState.z - Math.cos(carState.angle) * camDist;
  const idealCamPos = new THREE.Vector3(behindX, camH, behindZ);
  camera.position.lerp(idealCamPos, 6 * delta);

  // Look slightly ahead of car
  camTarget.set(
    carState.x + Math.sin(carState.angle) * 3,
    0.8,
    carState.z + Math.cos(carState.angle) * 3
  );
  camera.lookAt(camTarget);

  // Zone proximity check
  const detectRadius = 9;
  let foundZone = null;
  ZONES.forEach(zone => {
    const dx = carState.x - zone.x;
    const dz = carState.z - zone.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const inZone = dist < detectRadius;

    // Pulse ring + board glow
    zone._ring.rotation.z += delta * 0.4;
    zone._ringMat.opacity = inZone ? 0.7 + Math.sin(t * 4) * 0.2 : 0.4;
    zone._pt.intensity = inZone ? 6 + Math.sin(t * 3) * 1.5 : 4;
    if (zone._board) {
      zone._board.position.y = 2.0 + Math.sin(t * 1.2 + zone.x * 0.5) * 0.12;
    }

    if (inZone && !panelOpen) foundZone = zone;
  });

  nearZone = foundZone;
  updateZoneLabel(foundZone);

  // ── PHYSICS STEP (must be before enter prompt so nearResetBox is defined) ──
  stepPhysics(delta);
  checkCarBlockCollisions();
  checkBowlingCollisions();
  const nearResetBox = checkResetBox();

  // Enter prompt
  const enterPrompt = document.getElementById('enter-prompt');
  const nearGarage = checkGarage();
  if (nearResetBox) {
    // handled by checkResetBox
  } else if (nearGarage) {
    document.getElementById('enter-text').textContent = 'Enter Garage 🔧';
    enterPrompt.classList.add('show');
  } else if (foundZone && !panelOpen) {
    document.getElementById('enter-text').textContent = 'Enter — ' + foundZone.label;
    enterPrompt.classList.add('show');
  } else {
    enterPrompt.classList.remove('show');
  }

  // Minimap & speedo
  updateMinimap();
  updateSpeedo(carState.speed);

  // Zone rings pulse
  ZONES.forEach(z => {
    if (z._ring) z._ring.scale.setScalar(1 + Math.sin(t * 1.5 + z.x) * 0.03);
  });

  renderer.render(scene, camera);
}

// ════════════════════════════════════════════════
//  PHYSICS LETTER BLOCKS — "RITESH MURALIDHAR"
// ════════════════════════════════════════════════

// Tiny self-contained rigid-body physics (no lib needed)
const physBodies = [];

const GRAVITY    = -28;
const RESTITUTION = 0.35;   // bounciness
const FRICTION_PH = 0.78;   // horizontal damping on ground contact
const ANG_DAMP    = 0.88;   // angular damping

class RigidBody {
  constructor(mesh, hw, hh, hd, mass = 1) {
    this.mesh = mesh;
    this.hw = hw; this.hh = hh; this.hd = hd; // half-extents
    this.mass = mass;
    this.inv  = 1 / mass;
    // linear
    this.vx = 0; this.vy = 0; this.vz = 0;
    // angular velocity (euler rates)
    this.ax = 0; this.ay = 0; this.az = 0;
    this.onGround = false;
    this.sleeping  = false;
    this.sleepTimer = 0;
    this.active = true; // start resting, wake on collision
    // record initial pose for reset
    this.initPos = mesh.position.clone();
    this.initRot = mesh.rotation.clone();
  }
  wake() { this.sleeping = false; this.sleepTimer = 0; this.active = true; }
  reset() {
    this.mesh.position.copy(this.initPos);
    this.mesh.rotation.copy(this.initRot);
    this.vx=this.vy=this.vz=this.ax=this.ay=this.az=0;
    this.onGround=false; this.sleeping=false; this.active=false;
  }
}

function stepPhysics(dt) {
  const floor = 0;
  [...physBodies, ...pinBodies].forEach(b => {
    if (!b.active) return;
    if (b.sleeping)  return;

    // Gravity
    b.vy += GRAVITY * dt;

    // Integrate position
    b.mesh.position.x += b.vx * dt;
    b.mesh.position.y += b.vy * dt;
    b.mesh.position.z += b.vz * dt;

    // Integrate rotation
    b.mesh.rotation.x += b.ax * dt;
    b.mesh.rotation.y += b.ay * dt;
    b.mesh.rotation.z += b.az * dt;

    // Floor collision (use half-height as rough radius)
    const bottom = b.mesh.position.y - b.hh;
    if (bottom < floor) {
      b.mesh.position.y = floor + b.hh;
      if (b.vy < 0) {
        b.vy = -b.vy * RESTITUTION;
        if (Math.abs(b.vy) < 0.5) b.vy = 0;
      }
      b.onGround = true;
      b.vx *= FRICTION_PH;
      b.vz *= FRICTION_PH;
      b.ax *= FRICTION_PH;
      b.ay *= FRICTION_PH;
      b.az *= FRICTION_PH;
    } else {
      b.onGround = false;
    }

    // Angular damping
    b.ax *= ANG_DAMP;
    b.ay *= ANG_DAMP;
    b.az *= ANG_DAMP;

    // Sleep check
    const motion = Math.abs(b.vx)+Math.abs(b.vy)+Math.abs(b.vz)+Math.abs(b.ax)+Math.abs(b.ay)+Math.abs(b.az);
    if (motion < 0.08 && b.onGround) {
      b.sleepTimer += dt;
      if (b.sleepTimer > 0.8) b.sleeping = true;
    } else {
      b.sleepTimer = 0;
    }
  });
}

// Car → block collision: AABB impulse
function checkCarBlockCollisions() {
  // Car AABB in world space (approximate)
  const carHW = 1.1, carHH = 0.7, carHD = 2.3;
  const cx = carState.x, cz = carState.z;
  // Rotate car corners to get world-space AABB
  const s = Math.sin(carState.angle), c = Math.cos(carState.angle);

  physBodies.forEach(b => {
    if (!b.active) return;

    const bx = b.mesh.position.x;
    const by = b.mesh.position.y;
    const bz = b.mesh.position.z;

    // Transform block center into car local space
    const dx = bx - cx, dz = bz - cz;
    const lx =  dx * c - dz * s;  // car-local X
    const lz =  dx * s + dz * c;  // car-local Z

    const overlapX = carHW + b.hw - Math.abs(lx);
    const overlapZ = carHD + b.hd - Math.abs(lz);
    const overlapY = carHH + b.hh - Math.abs(by - 0.5);

    if (overlapX > 0 && overlapZ > 0 && overlapY > 0) {
      b.wake();

      // Speed-based impulse strength
      const spd = Math.abs(carState.speed);
      const impulse = spd * 0.6 + 2.5;

      // Push direction = from car center to block (world space)
      const pushLen = Math.sqrt(dx*dx+dz*dz) || 1;
      b.vx += (dx/pushLen) * impulse;
      b.vz += (dz/pushLen) * impulse;
      b.vy  += impulse * (0.4 + Math.random() * 0.5);

      // Random tumble
      b.ax  += (Math.random()-0.5) * impulse * 3;
      b.ay  += (Math.random()-0.5) * impulse * 3;
      b.az  += (Math.random()-0.5) * impulse * 3;

      // Slow the car slightly on impact
      carState.speed *= 0.82;
    }
  });
}

// ── BUILD LETTER BLOCKS ──
const LETTER_W  = 1.5;
const LETTER_H  = 1.8;
const LETTER_D  = 0.9;
const GAP       = 0.20;

const NAME_LINE1 = 'RITESH';
const NAME_LINE2 = 'MURALIDHAR';

// Palette
const BLOCK_COLORS = [0xc8f135, 0xff4d8d, 0x00f5d4, 0xff6b2b, 0x7c3aed, 0xffcc00, 0x00cfff, 0xff3355];

function makeLetterTexture(letter, bgColor) {
  const size = 256;
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const ctx2 = cv.getContext('2d');
  ctx2.fillStyle = '#' + bgColor.toString(16).padStart(6,'0');
  ctx2.fillRect(0, 0, size, size);
  ctx2.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx2.lineWidth = 8;
  ctx2.strokeRect(5, 5, size-10, size-10);
  // Draw letter normally — no flip needed
  ctx2.fillStyle = '#0a0a0f';
  ctx2.font = `bold ${Math.floor(size*0.74)}px "Arial Black", Impact, sans-serif`;
  ctx2.textAlign = 'center';
  ctx2.textBaseline = 'middle';
  ctx2.fillText(letter, size/2, size/2 + 4);
  return new THREE.CanvasTexture(cv);
}

function buildLetterBlock(letter, wx, wy, wz, colorHex) {
  const tex     = makeLetterTexture(letter, colorHex);
  const solidMat = new THREE.MeshLambertMaterial({ color: colorHex });
  const faceMat  = new THREE.MeshLambertMaterial({ map: tex });
  const darkMat  = new THREE.MeshLambertMaterial({ color: Math.floor(colorHex * 0.55) });

  // BoxGeometry face order: +X, -X, +Y, -Y, +Z, -Z
  // Car approaches from -Z (car is at z=0, blocks at z>0, car hits the -Z face)
  // So letter face = index 5 (-Z)
  const mats = [darkMat, darkMat, solidMat, darkMat, darkMat, faceMat];

  const geo  = new THREE.BoxGeometry(LETTER_W, LETTER_H, LETTER_D);
  const mesh = new THREE.Mesh(geo, mats);
  // NO rotation — face naturally points toward car
  mesh.position.set(wx, wy, wz);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  const body = new RigidBody(mesh, LETTER_W/2, LETTER_H/2, LETTER_D/2, 1);
  body.active = true;
  physBodies.push(body);
  return body;
}

function buildNameLine(word, centerX, baseZ, baseY) {
  const totalW = word.length * (LETTER_W + GAP) - GAP;
  let x = centerX - totalW / 2 + LETTER_W / 2;
  for (let i = 0; i < word.length; i++) {
    const col = BLOCK_COLORS[i % BLOCK_COLORS.length];
    buildLetterBlock(word[i], x, baseY + LETTER_H / 2, baseZ, col);
    x += LETTER_W + GAP;
  }
}

function makePin(wx, wz) {
  const g = new THREE.Group();

  const mat = new THREE.MeshLambertMaterial({ color: 0xf5f5f0 });
  const redMat = new THREE.MeshLambertMaterial({ color: 0xee2222 });

  // Base disc
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.30, 0.33, 0.12, 14), mat);
  base.position.y = 0.06; g.add(base);
  // Lower body
  const low = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.30, 0.30, 14), mat);
  low.position.y = 0.27; g.add(low);
  // Belly (widest)
  const belly = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.22, 0.28, 14), mat);
  belly.position.y = 0.51; g.add(belly);
  // Red stripe
  const stripe = new THREE.Mesh(new THREE.CylinderGeometry(0.23, 0.23, 0.10, 14), redMat);
  stripe.position.y = 0.72; g.add(stripe);
  // Neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.23, 0.22, 14), mat);
  neck.position.y = 0.93; g.add(neck);
  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 10), mat);
  head.position.y = 1.18; g.add(head);

  g.position.set(wx, 0, wz);
  g.castShadow = true;
  scene.add(g);

  // Physics body for the whole pin group
  const body = new RigidBody(g, 0.28, 0.62, 0.28, 0.6);
  body.active = true;
  pinBodies.push(body);
  return body;
}

// ── BOWLING FUNCTIONS ──
function resetPins() {
  pinBodies.forEach((b, i) => {
    b.mesh.position.set(pinPositions[i][0], 0, pinPositions[i][1]);
    b.mesh.rotation.set(0, 0, 0);
    b.vx=b.vy=b.vz=b.ax=b.ay=b.az=0;
    b.onGround=false; b.sleeping=false; b.active=true;
    b.sleepTimer=0;
  });
  pinsKnockedDown = 0;
  bowlingThrown   = false;
  updatePinHUD();
  showStrikeMsg('');
}

function updatePinHUD() {
  const standing = pinBodies.filter(b => !isPinDown(b)).length;
  document.getElementById('pin-count').textContent = standing + ' pin' + (standing !== 1 ? 's' : '');
}

function isPinDown(b) {
  // Pin is "knocked down" if tilted more than ~40deg or off the lane
  const rx = Math.abs(b.mesh.rotation.x % (Math.PI*2));
  const rz = Math.abs(b.mesh.rotation.z % (Math.PI*2));
  const tiltX = Math.min(rx, Math.PI - rx);
  const tiltZ = Math.min(rz, Math.PI - rz);
  return tiltX > 0.65 || tiltZ > 0.65 || b.mesh.position.y < -0.3;
}

function showStrikeMsg(msg) {
  document.getElementById('strike-msg').textContent = msg;
}

function checkBowlingCollisions() {
  const cx = carState.x, cz = carState.z;
  const s = Math.sin(carState.angle), c = Math.cos(carState.angle);
  const carHW = 1.1, carHH = 0.8, carHD = 2.3;

  pinBodies.forEach((b, i) => {
    if (!b.active) return;
    const bx = b.mesh.position.x, by = b.mesh.position.y, bz = b.mesh.position.z;
    const dx = bx - cx, dz = bz - cz;
    const lx = dx * c - dz * s;
    const lz = dx * s + dz * c;
    const overlapX = carHW + b.hw - Math.abs(lx);
    const overlapZ = carHD + b.hd - Math.abs(lz);
    const overlapY = carHH + b.hh - Math.abs(by - 0.5);
    if (overlapX > 0 && overlapZ > 0 && overlapY > 0) {
      b.wake();
      const spd = Math.abs(carState.speed);
      const impulse = spd * 0.7 + 3;
      const pushLen = Math.sqrt(dx*dx+dz*dz) || 1;
      b.vx += (dx/pushLen) * impulse;
      b.vz += (dz/pushLen) * impulse;
      b.vy += impulse * 0.3;
      b.ax += (Math.random()-0.5) * impulse * 4;
      b.ay += (Math.random()-0.5) * impulse * 2;
      b.az += (Math.random()-0.5) * impulse * 4;
      carState.speed *= 0.88;
      bowlingThrown = true;
    }
  });

  // Score check (after car has bowled)
  if (bowlingThrown) {
    const down = pinBodies.filter(b => isPinDown(b)).length;
    if (down !== pinsKnockedDown) {
      pinsKnockedDown = down;
      updatePinHUD();
      if (down === 10) showStrikeMsg('🎉 STRIKE!');
      else if (down >= 7) showStrikeMsg('🔥 ' + down + ' down!');
      else if (down > 0) showStrikeMsg(down + ' down');
    }
  }
}

function checkResetBox() {
  const dx = carState.x - RESET_BOX_X;
  const dz = carState.z - RESET_BOX_Z;
  const inBox = Math.abs(dx) < 2 && Math.abs(dz) < 2.5;

  // Pulse the reset box
  resetBorderMat.opacity = inBox ? 0.8 + Math.sin(t * 6) * 0.2 : 0.5;
  resetPt.intensity = inBox ? 4 + Math.sin(t * 4) * 1 : 2;
  resetBoxMesh.material.color.setHex(inBox ? 0x1a5a1a : 0x1a3a1a);

  // Show/hide bowling HUD and reset label when near the lane
  const nearLane = Math.abs(carState.x - BOWL_X) < 12 && Math.abs(carState.z - BOWL_Z) < 14;
  bowlHUD.style.opacity = nearLane ? '1' : '0';

  // Project reset box to screen for label
  const boxWorld = new THREE.Vector3(RESET_BOX_X, 1.2, RESET_BOX_Z);
  boxWorld.project(camera);
  if (boxWorld.z < 1) {
    const sx = ( boxWorld.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (-boxWorld.y * 0.5 + 0.5) * window.innerHeight;
    resetLabel.style.left = (sx - 60) + 'px';
    resetLabel.style.top  = (sy - 18) + 'px';
    resetLabel.style.opacity = inBox ? '0' : (nearLane ? '1' : '0');
  }

  if (inBox) {
    // Show enter prompt override
    document.getElementById('enter-text').textContent = 'Reset Bowling Pins 🎳';
    document.getElementById('enter-prompt').classList.add('show');
    return true; // signals "near reset box"
  }
  return false;
}

// ── TOUCH JOYSTICK ──
const joystickBase  = document.getElementById('joystick-base');
const joystickKnob  = document.getElementById('joystick-knob');
const JOY_RADIUS    = 33; // max knob travel px
let joyActive = false;
let joyOriginX = 0, joyOriginY = 0;
let joyDx = 0, joyDy = 0; // -1..1

joystickBase.addEventListener('touchstart', e => {
  e.preventDefault();
  joyActive = true;
  const rect = joystickBase.getBoundingClientRect();
  joyOriginX = rect.left + rect.width  / 2;
  joyOriginY = rect.top  + rect.height / 2;
}, { passive: false });

joystickBase.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!joyActive) return;
  const touch = e.touches[0];
  let dx = touch.clientX - joyOriginX;
  let dy = touch.clientY - joyOriginY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > JOY_RADIUS) { dx = dx/dist*JOY_RADIUS; dy = dy/dist*JOY_RADIUS; }
  joyDx = dx / JOY_RADIUS;
  joyDy = dy / JOY_RADIUS;
  // Position knob visually within the base circle
  joystickKnob.style.left = (50 + (dx / JOY_RADIUS) * 35) + '%';
  joystickKnob.style.top  = (50 + (dy / JOY_RADIUS) * 35) + '%';
}, { passive: false });

['touchend','touchcancel'].forEach(ev => joystickBase.addEventListener(ev, () => {
  joyActive = false; joyDx = 0; joyDy = 0;
  joystickKnob.style.left = '50%';
  joystickKnob.style.top  = '50%';
}));

// applyJoystick receives real delta from animate loop
function applyJoystick(delta) {
  if (!joyActive) return;
  const accel = 70, steer = 3.0, maxSpeed = 45;
  // Up = forward (joyDy negative = push up)
  if (joyDy < -0.12) carState.speed = Math.min(carState.speed + accel * delta * (-joyDy), maxSpeed);
  else if (joyDy > 0.12) carState.speed = Math.max(carState.speed - accel * delta * joyDy * 0.8, -maxSpeed * 0.4);
  // Steer left/right
  if (Math.abs(carState.speed) > 0.3) {
    const dir = carState.speed > 0 ? 1 : -1;
    carState.angle -= joyDx * steer * delta * dir;
  }
}

function mobileE() {
  // Same logic as E key
  const bdx = carState.x - RESET_BOX_X;
  const bdz = carState.z - RESET_BOX_Z;
  if (Math.abs(bdx) < 2 && Math.abs(bdz) < 2.5) { resetPins(); return; }
  if (checkGarage()) { openGarage(); return; }
  if (garageOpen) { closeGarage(); return; }
  if (nearZone && !panelOpen) { openPanel(nearZone); return; }
  if (panelOpen) { closePanel(); return; }
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
